<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade Successful</title>
    <style>
        /* Reset some default browser styles */
        body, h1, p, a {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom right, #007bff, #00c6ff);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: #fff;
            color: #333;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        h1 {
            font-size: 2.2em;
            margin-bottom: 20px;
            color: #28a745;
        }

        p {
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .dates {
            font-weight: bold;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            padding: 12px 20px;
            background: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        a:hover {
            background: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .icon {
            font-size: 50px;
            color: #28a745;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✔</div>
        <h1>Upgrade Successful!</h1>
        <p>Congratulations! Your account has been upgraded to premium.</p>
        <div class="dates">
            <p><strong>Premium Start Date:</strong> {{ start_date }}</p>
            <p><strong>Premium End Date:</strong> {{ end_date }}</p>
        </div>
        <a href="{% url 'udash' %}">Go to Dashboard</a>
    </div>
</body>
</html>
