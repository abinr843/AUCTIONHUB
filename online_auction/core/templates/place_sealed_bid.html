<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Sealed Bid - ZinCo Auctions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            --text: #1f2937;
            --text-light: #6b7280;
            --light-bg: #f8fafc;
            --white: #ffffff;
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .input-highlight {
            transition: var(--transition);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .hover-scale {
            transition: var(--transition);
        }

        .hover-scale:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-[var(--light-bg)]">

    <!-- Main Content -->
    <main class="min-h-screen flex items-center justify-center px-4 sm:px-6 lg:px-8 py-12">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-lg animate-fade-in">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-[var(--primary)] rounded-full mx-auto mb-4 flex items-center justify-center">
                    <i class="fas fa-gavel text-white text-2xl"></i>
                </div>
                <h1 class="text-3xl font-bold text-[var(--text)] mb-2">Place Your Sealed Bid</h1>
                <p class="text-[var(--text-light)]">Secure your chance to win this auction</p>
            </div>




            {% if messages %}
                {% for message in messages %}
                    <div class="{% if message.tags == 'success' %}bg-[var(--success)]/10 border-l-4 border-[var(--success)] text-[var(--success)]{% else %}bg-[var(--error)]/10 border-l-4 border-[var(--error)] text-[var(--error)]{% endif %} p-4 rounded-lg mb-6">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Bid Form -->
            <form action="{% url 'place_sealed_bid' auction_id=auction_id %}" method="POST" class="space-y-6">
                {% csrf_token %}
                <input type="hidden" name="auction_id" value="{{ auction_id }}">

                <div>
                    <label for="amount" class="block text-sm font-medium text-[var(--text)] mb-2">Bid Amount ($)</label>
                    <input type="number" step="0.01" min="0" id="amount" name="amount"
                           class="w-full p-3 border-2 border-[var(--light-bg)] rounded-xl focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary)]/30 transition placeholder-[var(--text-light)]"
                           placeholder="Enter your bid amount">
                </div>

                <button type="submit"
                        class="w-full bg-gradient-to-r from-[var(--primary)] to-[var(--secondary)] text-white py-3.5 rounded-xl font-medium hover-scale hover:shadow-lg transition">
                    Submit Bid
                </button>
            </form>

            <div class="mt-8 flex justify-between items-center text-sm">
                <a href="{% url 'auct_deta' auction_id=auction_id %}"
                   class="text-[var(--primary)] hover:text-[var(--primary-dark)] hover:underline">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Auction
                </a>
                <span class="text-[var(--text-light)]">Secure bidding system</span>
            </div>
        </div>
    </main>

    <script>
        // Form validation
        document.querySelector('form').addEventListener('submit', (e) => {
            const bidAmount = document.getElementById('amount');
            let isValid = true;

            if (!bidAmount.value) {
                bidAmount.classList.add('input-highlight');
                isValid = false;
            }

            if (!isValid) {
                e.preventDefault();
                setTimeout(() => {
                    bidAmount.classList.remove('input-highlight');
                }, 2000);
            }
        });

        // Input formatting
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^0-9.]/g, '')
                    .replace(/(\..*)\./g, '$1');
            });
        });
    </script>
</body>
</html>
