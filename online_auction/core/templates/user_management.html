<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Management - Admin Dashboard</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      padding-top: 60px;
    }
    .search-box {
      max-width: 500px;
      margin-bottom: 20px;
    }
    table th, table td {
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <a class="navbar-brand" href="#">Admin Dashboard</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item active">
          <a class="nav-link" href="/admin/users/">User Management</a>
        </li>
        <!-- Additional nav links can be added here -->
      </ul>
    </div>
  </nav>

  <div class="container">
    <h2 class="mt-4 mb-4">User Management</h2>

    <!-- Search Form -->
    <form method="GET" class="form-inline mb-4">
      <input type="text" name="search" value="{{ search_query }}" class="form-control mr-2 search-box" placeholder="Search by username or email">
      <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <!-- User Table -->
    <div class="table-responsive">
      <table class="table table-bordered table-striped">
        <thead class="thead-dark">
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for user in users %}
          <tr>
            <td>{{ user.0 }}</td>
            <td>{{ user.1 }}</td>
            <td>{{ user.2 }}</td>
            <td>{{ user.3 }}</td>
            <td>{{ user.4 }}</td>
            <td>
              <a href="{% url 'admin_edit_user' user.0 %}" class="btn btn-sm btn-warning">Edit</a>
              <a href="{% url 'admin_delete_user' user.0 %}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?');">Delete</a>
              <a href="{% url 'admin_suspend_user' user.0 %}" class="btn btn-sm btn-secondary">Suspend</a>
              <a href="{% url 'admin_reset_password' user.0 %}" class="btn btn-sm btn-info">Reset Password</a>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="6">No users found.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
