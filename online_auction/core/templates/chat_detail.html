<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chat with users on AuctionHub, the premier online auction platform.">
  <meta name="keywords" content="auction, chat, messaging, communication">
  <meta name="author" content="AuctionHub Team">
  <title>Chat with {{ buyer.username }} - AuctionHub</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --accent: #f59e0b;
      --success: #10b981;
      --error: #ef4444;
      --text: #1f2937;
      --text-light: #6b7280;
      --light-bg: #f8fafc;
      --white: #ffffff;
      --shadow: 0 8px 30px rgba(0,0,0,0.05);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --border-radius: 0.75rem;
      --header-height: 70px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--light-bg), #e2e8f0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      margin: 0;
    }

    .chat-container {
      width: 100%;
      max-width: 500px;
      height: 90vh;
      max-height: 750px;
      background: var(--white);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      height: var(--header-height);
      background: linear-gradient(to right, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .go-back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      transition: var(--transition);
    }

    .go-back-btn:hover {
      background: var(--primary);
      color: var(--white);
      transform: scale(1.1);
    }

    .chat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid var(--primary);
      position: relative;
    }

    .chat-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .online-status {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--success);
      border: 2px solid var(--white);
    }

    .buyer-info h6 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .buyer-info small {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    .header-actions .btn {
      background: none;
      border: none;
      color: var(--text-light);
      font-size: 1.1rem;
      padding: 0.75rem;
      transition: var(--transition);
    }

    .header-actions .btn:hover {
      color: var(--primary);
      transform: scale(1.1);
    }

    .dropdown-menu {
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      border: none;
      padding: 0.5rem;
    }

    .dropdown-item {
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .dropdown-item:hover {
      background-color: var(--light-bg);
      color: var(--primary);
    }

    .chat-messages {
      flex: 1;
      background: var(--light-bg);
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .message {
      max-width: 80%;
      padding: 0.75rem 1.25rem;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.6;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      animation: slideIn 0.4s ease;
      position: relative;
    }

    .message.buyer {
      background: linear-gradient(to bottom, var(--secondary), #7c3aed);
      color: var(--white);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.seller {
      background: linear-gradient(to bottom, var(--primary), var(--primary-dark));
      color: var(--white);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message-attachment img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 0.75rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .message-attachment img:hover {
      transform: scale(1.02);
    }

    .message-attachment a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      margin-top: 0.75rem;
      display: inline-block;
      transition: var(--transition);
    }

    .message-attachment a:hover {
      color: var(--primary);
      text-decoration: underline;
    }

    .message-time {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 0.5rem;
      text-align: right;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .chat-footer {
      padding: 1rem;
      background: linear-gradient(to top, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.7));
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .chat-footer form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 25px;
      padding: 0.75rem 3.5rem 0.75rem 1.25rem;
      font-size: 0.95rem;
      resize: none;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur XBp(5px);
      transition: var(--transition);
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }

    .chat-attach-btn, .chat-send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      position: absolute;
    }

    .chat-attach-btn {
      right: 48px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--secondary);
      color: var(--white);
    }

    .chat-attach-btn:hover {
      background: #7c3aed;
      transform: translateY(-50%) scale(1.1);
    }

    .chat-send-btn {
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--primary);
      color: var(--white);
    }

    .chat-send-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-50%) scale(1.1);
    }

    .chat-send-btn:disabled {
      background: var(--text-light);
      cursor: not-allowed;
    }

    .file-preview {
      font-size: 0.85rem;
      color: var(--text);
      background: var(--light-bg);
      padding: 0.75rem;
      border-radius: 10px;
      display: none;
      align-items: center;
      gap: 0.75rem;
      position: relative;
    }

    .file-preview .remove-file {
      cursor: pointer;
      color: var(--error);
      font-size: 1rem;
      transition: var(--transition);
    }

    .file-preview .remove-file:hover {
      color: #dc2626;
    }

    .file-progress {
      height: 4px;
      background: var(--text-light);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .file-progress-bar {
      width: 0;
      height: 100%;
      background: var(--success);
      transition: width 2s ease;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      color: var(--text-light);
    }

    .empty-icon {
      margin-bottom: 1.5rem;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--light-bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary-dark);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .modal-content {
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
      border: none;
    }

    .modal-header {
      background: var(--primary);
      color: var(--white);
      border-top-left-radius: var(--border-radius);
      border-top-right-radius: var(--border-radius);
    }

    .modal-footer {
      border-top: none;
    }

    .btn-danger {
      background: var(--error);
      border: none;
      border-radius: 50px;
      padding: 0.5rem 1.25rem;
      transition: var(--transition);
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--text-light);
      border: none;
      border-radius: 50px;
      padding: 0.5rem 1.25rem;
      transition: var(--transition);
    }

    .btn-secondary:hover {
      background: #4b5563;
      color: var(--white);
      transform: translateY(-2px);
    }

    /* Responsive adjustments */
    @media (max-width: 576px) {
      .chat-container {
        max-width: 100%;
        height: 100vh;
        border-radius: 0;
      }

      .chat-header {
        padding: 0 1rem;
      }

      .go-back-btn {
        width: 32px;
        height: 32px;
      }

      .chat-avatar {
        width: 40px;
        height: 40px;
      }

      .buyer-info h6 {
        font-size: 1rem;
      }

      .chat-messages {
        padding: 1rem;
      }

      .message {
        max-width: 85%;
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }

      .chat-footer {
        padding: 0.75rem;
      }

      .chat-input {
        padding: 0.5rem 3rem 0.5rem 1rem;
        font-size: 0.9rem;
      }

      .chat-attach-btn, .chat-send-btn {
        width: 32px;
        height: 32px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="header-left">
        <a href="{% url 'seller_inbox' %}" class="go-back-btn" title="Back to Inbox" aria-label="Back to Inbox">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </a>
        <div class="chat-avatar">
          <img src="{{ buyer.profile_picture }}" alt="{{ buyer.username }}'s avatar">
          <div class="online-status"></div>
        </div>
        <div class="buyer-info">
          <h6>
            {{ buyer.username }}
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 3h4v6h4l-6 12H6l-6-12h4V3z" />
            </svg>
          </h6>
          <small>Active now</small>
        </div>
      </div>
      <div class="header-actions dropdown">
        <button class="btn dropdown-toggle" type="button" id="chatOptions" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Chat options">
          <i class="fas fa-ellipsis-v"></i>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="chatOptions">
          <li><a class="dropdown-item" href="#" onclick="clearChat({{ buyer_id }}); return false;">Clear Chat</a></li>
          <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#reportModal">Report User</a></li>
        </ul>
      </div>
    </div>

    <div class="chat-messages" id="chatBox">
      {% if not messages %}
        <div class="empty-state">
          <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 3h4v6h4l-6 12H6l-6-12h4V3z" />
            </svg>
          </div>
          <h4>Start the Conversation</h4>
          <p>Send a message to begin bidding or discussing auction details.</p>
        </div>
      {% endif %}
    </div>

    <div class="chat-footer">
      <form id="reply-form" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="hidden" name="auction_id" id="auction_id" value="{{ messages.0.auction_id|default:'' }}">
        <input type="hidden" name="buyer_id" id="buyer_id" value="{{ buyer_id }}">
        <div class="input-group">
          <textarea name="message" id="reply-message" class="chat-input" rows="1" placeholder="Type your message..." autocomplete="off" aria-label="Message input"></textarea>
          <button type="button" class="chat-attach-btn" id="attachBtn" title="Attach a file" aria-label="Attach file">
            <i class="fas fa-paperclip"></i>
          </button>
          <input type="file" id="fileInput" name="attachment" accept="image/*,.pdf,.txt,.doc,.docx" style="display: none;">
          <button type="submit" class="chat-send-btn" id="sendBtn" title="Send message" aria-label="Send message">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
          </button>
        </div>
        <div class="file-preview" id="filePreview">
          <span id="fileName"></span>
          <i class="fas fa-times remove-file" title="Remove file" aria-label="Remove selected file"></i>
          <div class="file-progress">
            <div class="file-progress-bar"></div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="modal fade" id="reportModal" tabindex="-1" aria-labelledby="reportModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="report-form">
          {% csrf_token %}
          <div class="modal-header">
            <h5 class="modal-title" id="reportModalLabel">Report User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p>Please select a reason for reporting this user:</p>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="reason" id="reason1" value="Spamming" required>
              <label class="form-check-label" for="reason1">Spamming</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="reason" id="reason2" value="Harassment">
              <label class="form-check-label" for="reason2">Harassment</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="reason" id="reason3" value="Inappropriate content">
              <label class="form-check-label" for="reason3">Inappropriate content</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="reason" id="reason4" value="Other">
              <label class="form-check-label" for="reason4">Other</label>
            </div>
            <div class="mt-3" id="otherReasonContainer" style="display: none;">
              <input type="text" class="form-control" name="other_reason" id="otherReason" placeholder="Enter custom reason" aria-label="Custom reason">
            </div>
            <input type="hidden" name="target_user_id" id="target_user_id" value="{{ buyer_id }}">
            <input type="hidden" name="action" value="report">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-danger">Report User</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    $(document).ready(function() {
      const currentUserId = "{{ request.session.user_id|default_if_none:'null' }}";
      const auctionId = $("#auction_id").val();
      const buyerId = $("#buyer_id").val();
      const displayedMessageIds = new Set();
      const textarea = $("#reply-message");
      const chatBox = $("#chatBox");
      const fileInput = $("#fileInput");
      const filePreview = $("#filePreview");
      const fileNameSpan = $("#fileName");
      const sendBtn = $("#sendBtn");
      const fileProgressBar = $(".file-progress-bar");

      // Setup AJAX CSRF token
      $.ajaxSetup({
        beforeSend: function(xhr, settings) {
          if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type) && !this.crossDomain) {
            xhr.setRequestHeader("X-CSRFToken", "{{ csrf_token }}");
          }
        }
      });

      // Auto-resize textarea
      textarea.on("input", function() {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 120) + "px";
      });

      // Scroll to bottom of chat
      function scrollToBottom() {
        chatBox.scrollTop(chatBox[0].scrollHeight);
      }

      // Append message to chat
      function appendMessage(senderId, senderUsername, message, timestamp, msgId, attachment) {
        if (displayedMessageIds.has(msgId)) return;

        const isCurrentUser = String(senderId) === String(currentUserId);
        const messageClass = isCurrentUser ? "seller" : "buyer";
        const formattedTime = new Date(timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        let attachmentHTML = "";
        if (attachment) {
          const isImage = /\.(png|jpg|jpeg|gif)$/i.test(attachment);
          attachmentHTML = isImage
            ? `<div class="message-attachment"><a href="${attachment}" target="_blank"><img src="${attachment}" alt="Attachment"></a></div>`
            : `<div class="message-attachment"><a href="${attachment}" target="_blank" download>Download File</a></div>`;
        }

        const messageHTML = `
          <div class="message ${messageClass}" data-msg-id="${msgId}">
            <p class="mb-0">${message}</p>
            ${attachmentHTML}
            <div class="message-time">
              ${formattedTime}
              ${isCurrentUser ? '<i class="fas fa-check"></i>' : ''}
            </div>
          </div>`;
        chatBox.append(messageHTML);
        displayedMessageIds.add(msgId);
        scrollToBottom();
      }

      // Handle attach button click
      $("#attachBtn").on("click", function(e) {
        e.preventDefault();
        fileInput.click();
      });

      // Handle file selection
      fileInput.on("change", function() {
        const file = this.files[0];
        if (file) {
          if (file.size > 300 * 1024) {
            alert("File size exceeds 300KB limit.");
            this.value = "";
            filePreview.hide();
          } else {
            const allowedExtensions = ['.png', '.jpg', '.jpeg', '.gif', '.pdf', '.txt', '.doc', '.docx'];
            const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            if (!allowedExtensions.includes(ext)) {
              alert("Invalid file type. Allowed: images, .pdf, .txt, .doc, .docx");
              this.value = "";
              filePreview.hide();
            } else {
              fileNameSpan.text(file.name);
              filePreview.show();
              // Simulate file upload progress
              fileProgressBar.css("width", "0%");
              setTimeout(() => fileProgressBar.css("width", "100%"), 100);
            }
          }
        } else {
          filePreview.hide();
          fileProgressBar.css("width", "0%");
        }
      });

      // Remove selected file
      $(".remove-file").on("click", function() {
        fileInput.val("");
        filePreview.hide();
        fileProgressBar.css("width", "0%");
      });

      // Handle form submission
      $("#reply-form").on("submit", function(e) {
        e.preventDefault();
        const messageContent = textarea.val().trim();
        const file = fileInput[0].files[0];

        if (!messageContent && !file) {
          alert("Please enter a message or select a file.");
          return;
        }

        const formData = new FormData(this);
        sendBtn.prop("disabled", true);

        $.ajax({
          type: "POST",
          url: "{% url 'contact_seller' %}",
          data: formData,
          processData: false,
          contentType: false,
          dataType: "json",
          beforeSend: function() {
            console.log("Sending:", { message: messageContent, file: file ? file.name : "No file" });
            fileProgressBar.css("width", "20%");
          },
          success: function(response) {
            console.log("Response:", response);
            if (response.success && response.msg_id) {
              appendMessage(
                currentUserId,
                "You",
                messageContent,
                response.timestamp,
                response.msg_id,
                response.attachment
              );
              textarea.val("").css("height", "auto");
              fileInput.val("");
              filePreview.hide();
              fileProgressBar.css("width", "100%");
            } else {
              alert("Failed to send message: " + (response.error || "Unknown error"));
            }
          },
          error: function(xhr) {
            console.error("Send error:", xhr.status, xhr.responseText);
            alert("Error sending message: " + (xhr.responseText || "Server error"));
          },
          complete: function() {
            sendBtn.prop("disabled", false);
            fileProgressBar.css("width", "0%");
          }
        });
      });

      // Fetch messages
      function fetchMessages() {
        $.ajax({
          url: "{% url 'chat_detail' buyer_id=buyer_id %}",
          type: "GET",
          headers: { "X-Requested-With": "XMLHttpRequest" },
          data: { t: new Date().getTime() },
          dataType: "json",
          success: function(data) {
            console.log("Fetch response:", data);
            if (data.messages && data.messages.length) {
              chatBox.find(".empty-state").remove();
              data.messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
              data.messages.forEach(msg => {
                appendMessage(
                  msg.sender_id,
                  msg.sender_username,
                  msg.message,
                  msg.timestamp,
                  msg.id,
                  msg.attachment
                );
              });
            }
          },
          error: function(xhr) {
            console.error("Fetch error:", xhr.status, xhr.responseText);
          }
        });
      }

      fetchMessages();
      setInterval(fetchMessages, 1000);

      // Report form handling
      $("input[name='reason']").on("change", function() {
        $("#otherReasonContainer").toggle($(this).val() === "Other");
        $("#otherReason").val("");
      });

      $("#report-form").on("submit", function(e) {
        e.preventDefault();
        let reason = $("input[name='reason']:checked").val();
        if (reason === "Other") {
          reason = $("#otherReason").val().trim();
          if (!reason) {
            alert("Please specify a reason.");
            return;
          }
        }
        $.ajax({
          type: "POST",
          url: "{% url 'report_block_user' %}",
          data: $(this).serialize(),
          dataType: "json",
          success: function(data) {
            console.log("Report response:", data);
            alert(data.message);
            if (data.status === "success") {
              bootstrap.Modal.getInstance(document.getElementById("reportModal")).hide();
            }
          },
          error: function(xhr) {
            console.error("Report error:", xhr.responseText);
            alert("Error: " + xhr.responseText);
          }
        });
      });

      // Clear chat
      window.clearChat = function(otherUserId) {
        if (!otherUserId) {
          alert("Error: Buyer ID is missing!");
          return;
        }
        if (confirm("Are you sure you want to clear this chat? This action cannot be undone.")) {
          $.ajax({
            type: "POST",
            url: "{% url 'clear_chat' %}",
            data: {
              other_user_id: otherUserId,
              csrfmiddlewaretoken: $('input[name="csrfmiddlewaretoken"]').val()
            },
            dataType: "json",
            success: function(response) {
              console.log("Clear chat response:", response);
              if (response.status === "success") {
                alert("Chat cleared successfully");
                chatBox.empty().append(`
                  <div class="empty-state">
                    <div class="empty-icon">
                      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 3h4v6h4l-6 12H6l-6-12h4V3z" />
                      </svg>
                    </div>
                    <h4>Start the Conversation</h4>
                    <p>Send a message to begin bidding or discussing auction details.</p>
                  </div>
                `);
                displayedMessageIds.clear();
              } else {
                alert(response.message);
              }
            },
            error: function(xhr) {
              console.error("Clear chat error:", xhr.responseText);
              alert("Error clearing chat: " + xhr.responseText);
            }
          });
        }
      };

      scrollToBottom();
    });
  </script>
</body>
</html>
